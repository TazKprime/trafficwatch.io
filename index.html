<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TrafficWatch GH — Live Road Intelligence</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>

<style>
:root {
  --red: #E8301A; --amber: #F59E0B; --green: #10B981;
  --bg: #0A0C0F; --surface: #111318; --surface2: #1A1D24; --surface3: #22262F;
  --border: rgba(255,255,255,0.07);
  --text: #F0F2F5; --text-muted: #6B7280; --text-dim: #9CA3AF;
  --radius: 16px; --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }

#map { position:fixed; inset:0; z-index:1; }
.leaflet-container { background:#0d1117; font-family:'DM Sans',sans-serif; }

/* TOP BAR */
#topbar { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:linear-gradient(180deg,rgba(10,12,15,.98) 0%,rgba(10,12,15,0) 100%); pointer-events:none; }
#logo { pointer-events:all; display:flex; align-items:center; gap:10px; }
#logo-mark { width:36px; height:36px; background:var(--red); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow:0 0 20px rgba(232,48,26,.5); }
#logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:17px; letter-spacing:-.3px; line-height:1.1; }
#logo-text span { color:var(--amber); }
#logo-sub { font-size:10px; color:var(--text-muted); letter-spacing:.5px; text-transform:uppercase; display:flex; align-items:center; gap:4px; }
#conn-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); transition:all .5s; display:inline-block; }
#conn-dot.offline { background:var(--amber); box-shadow:0 0 6px var(--amber); }
#stats-pill { pointer-events:all; display:flex; gap:6px; }
.stat-chip { background:rgba(10,12,15,.85); backdrop-filter:blur(16px); border:1px solid var(--border); border-radius:20px; padding:5px 10px; font-size:12px; font-weight:500; display:flex; align-items:center; gap:5px; white-space:nowrap; }
.stat-chip .dot { width:7px; height:7px; border-radius:50%; animation:pulse-dot 2s infinite; }
.dot-red { background:var(--red); box-shadow:0 0 6px var(--red); }
.dot-amber { background:var(--amber); box-shadow:0 0 6px var(--amber); }
.dot-green { background:var(--green); }
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.8)} }

#offline-banner { position:fixed; top:64px; left:50%; transform:translateX(-50%); z-index:200; background:rgba(245,158,11,.95); color:#000; padding:8px 20px; border-radius:20px; font-size:13px; font-weight:600; display:none; align-items:center; gap:8px; box-shadow:0 4px 20px rgba(0,0,0,.4); white-space:nowrap; }
#offline-banner.show { display:flex; }

/* BOTTOM PANEL */
#bottom-panel { position:fixed; bottom:0; left:0; right:0; z-index:100; padding:0 12px 12px; pointer-events:none; display:flex; flex-direction:column; gap:8px; }
#layer-controls { pointer-events:all; display:flex; gap:6px; justify-content:center; }
.layer-btn { background:rgba(17,19,24,.92); backdrop-filter:blur(16px); border:1px solid var(--border); border-radius:20px; color:var(--text-dim); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; padding:7px 14px; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:6px; }
.layer-btn.active { background:rgba(245,158,11,.15); border-color:rgba(245,158,11,.4); color:var(--amber); }
.layer-btn:hover { border-color:rgba(255,255,255,.15); color:var(--text); }
#report-btn { pointer-events:all; display:flex; align-items:center; justify-content:center; gap:10px; background:var(--red); color:white; border:none; border-radius:var(--radius); padding:16px 24px; font-family:'Syne',sans-serif; font-size:16px; font-weight:700; cursor:pointer; letter-spacing:.2px; box-shadow:0 0 40px rgba(232,48,26,.4),0 8px 24px rgba(0,0,0,.5); transition:all .2s; position:relative; overflow:hidden; }
#report-btn::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 60%); }
#report-btn:hover { transform:translateY(-2px); box-shadow:0 0 60px rgba(232,48,26,.5),0 12px 32px rgba(0,0,0,.5); }
#report-btn:active { transform:translateY(0); }
#pending-badge { position:absolute; top:-4px; right:-4px; background:var(--amber); color:#000; border-radius:10px; font-size:10px; font-weight:800; padding:2px 6px; display:none; }
#pending-badge.show { display:block; }

/* MODAL */
#modal-overlay { position:fixed; inset:0; z-index:300; background:rgba(0,0,0,.75); backdrop-filter:blur(4px); display:none; align-items:flex-end; justify-content:center; }
#modal-overlay.open { display:flex; }
#report-sheet { background:var(--surface); border-radius:24px 24px 0 0; width:100%; max-width:580px; max-height:92vh; overflow-y:auto; padding:0 0 32px; transform:translateY(100%); transition:transform .35s cubic-bezier(.34,1.56,.64,1); scrollbar-width:none; }
#report-sheet::-webkit-scrollbar { display:none; }
#modal-overlay.open #report-sheet { transform:translateY(0); }
.sheet-handle { display:flex; justify-content:center; padding:14px; }
.sheet-handle-bar { width:40px; height:4px; background:var(--surface3); border-radius:2px; }
.sheet-header { padding:4px 20px 20px; border-bottom:1px solid var(--border); }
.sheet-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; margin-bottom:4px; }
.sheet-sub { font-size:13px; color:var(--text-muted); }
.form-body { padding:20px; display:flex; flex-direction:column; gap:18px; }
.form-section label { display:block; font-size:12px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; }
#location-row { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; display:flex; align-items:center; gap:10px; }
#location-text { flex:1; font-size:13px; color:var(--text-dim); line-height:1.4; }
#location-text strong { display:block; color:var(--text); font-weight:500; font-size:13px; }
#refresh-gps { background:var(--surface3); border:none; border-radius:8px; color:var(--amber); font-size:16px; width:32px; height:32px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
#refresh-gps:hover { background:rgba(245,158,11,.15); }
#refresh-gps.spinning { animation:spin 1s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.type-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.type-chip { background:var(--surface2); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:10px 6px; text-align:center; cursor:pointer; transition:all .15s; display:flex; flex-direction:column; align-items:center; gap:4px; }
.type-chip .tc-icon { font-size:22px; }
.type-chip .tc-label { font-size:11px; font-weight:500; color:var(--text-dim); }
.type-chip.selected { background:rgba(245,158,11,.1); border-color:var(--amber); }
.type-chip.selected .tc-label { color:var(--amber); }
.type-chip:hover { border-color:rgba(255,255,255,.2); }
#photo-zone { background:var(--surface2); border:2px dashed var(--border); border-radius:var(--radius-sm); padding:24px 16px; text-align:center; cursor:pointer; transition:all .2s; position:relative; }
#photo-zone:hover { border-color:rgba(245,158,11,.4); background:rgba(245,158,11,.04); }
#photo-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; }
#photo-zone .pz-icon { font-size:28px; margin-bottom:6px; }
#photo-zone .pz-text { font-size:13px; color:var(--text-dim); }
#photo-zone .pz-hint { font-size:11px; color:var(--text-muted); margin-top:3px; }
#photo-preview { width:100%; border-radius:var(--radius-sm); max-height:180px; object-fit:cover; display:none; }
#photo-preview.show { display:block; }
#photo-zone.has-photo { padding:6px; border-style:solid; border-color:rgba(245,158,11,.3); }
#desc-input { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; padding:12px 14px; width:100%; resize:none; outline:none; min-height:80px; transition:border-color .2s; }
#desc-input::placeholder { color:var(--text-muted); }
#desc-input:focus { border-color:rgba(245,158,11,.4); }
#submit-btn { background:var(--red); color:white; border:none; border-radius:var(--radius-sm); padding:15px; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; cursor:pointer; width:100%; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
#submit-btn:hover { background:#c42a17; }
#submit-btn:disabled { opacity:.5; cursor:not-allowed; }

/* POPUP */
.incident-popup { min-width:240px; max-width:280px; }
.popup-type-badge { display:inline-flex; align-items:center; gap:5px; border-radius:6px; padding:3px 8px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.popup-type-badge.red { color:var(--red); background:rgba(232,48,26,.1); border:1px solid rgba(232,48,26,.2); }
.popup-type-badge.amber { color:var(--amber); background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.2); }
.popup-img { width:100%; height:130px; object-fit:cover; border-radius:8px; margin-bottom:10px; display:block; }
.popup-desc { font-size:13px; line-height:1.5; color:#c0c4cc; margin-bottom:10px; }
.popup-meta { display:flex; justify-content:space-between; font-size:11px; color:#6B7280; border-top:1px solid rgba(255,255,255,.06); padding-top:8px; margin-bottom:10px; }
.popup-votes { display:flex; gap:6px; }
.vote-btn { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:6px; color:#9CA3AF; font-size:12px; padding:5px 10px; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:4px; font-family:'DM Sans',sans-serif; }
.vote-btn:hover { background:rgba(255,255,255,.1); }
.vote-btn.up:hover { color:var(--green); border-color:rgba(16,185,129,.3); }
.vote-btn.down:hover { color:var(--red); border-color:rgba(232,48,26,.3); }
.popup-actions { display:flex; gap:6px; margin-top:8px; }
.popup-action-btn { flex:1; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-radius:7px; color:var(--text-dim); font-size:11px; font-weight:500; padding:7px 6px; cursor:pointer; transition:all .15s; font-family:'DM Sans',sans-serif; }
.popup-action-btn:hover { background:rgba(255,255,255,.09); color:var(--text); }
.popup-action-btn.confirm:hover { color:var(--green); border-color:rgba(16,185,129,.3); }
.popup-action-btn.resolve:hover { color:var(--amber); border-color:rgba(245,158,11,.3); }
.expiry-bar { height:2px; background:rgba(255,255,255,.05); border-radius:1px; margin-top:6px; overflow:hidden; }
.expiry-fill { height:100%; border-radius:1px; }
.expiry-fill.fresh { background:var(--green); }
.expiry-fill.aging { background:var(--amber); }
.expiry-fill.old { background:var(--red); }

/* LEAFLET POPUP SKIN */
.leaflet-popup-content-wrapper { background:var(--surface) !important; color:var(--text) !important; border-radius:14px !important; border:1px solid var(--border) !important; box-shadow:0 20px 60px rgba(0,0,0,.7) !important; padding:0 !important; }
.leaflet-popup-content { margin:14px !important; width:auto !important; }
.leaflet-popup-tip { background:var(--surface) !important; }
.leaflet-popup-close-button { color:var(--text-muted) !important; top:8px !important; right:10px !important; font-size:18px !important; }

/* TOAST */
#toast { position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(20px); z-index:500; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:10px 18px; font-size:14px; font-weight:500; display:flex; align-items:center; gap:8px; opacity:0; transition:all .3s; pointer-events:none; backdrop-filter:blur(16px); white-space:nowrap; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#toast.success { border-color:rgba(16,185,129,.3); }
#toast.error { border-color:rgba(232,48,26,.3); }
#toast.warning { border-color:rgba(245,158,11,.3); }

/* SETUP OVERLAY */

/* user location */
.loc-dot { width:14px; height:14px; background:#3b82f6; border:2px solid white; border-radius:50%; position:relative; }
.loc-dot::before { content:''; position:absolute; top:-4px; left:-4px; width:18px; height:18px; border-radius:50%; background:rgba(59,130,246,.3); animation:loc-pulse 2s infinite; }
@keyframes loc-pulse { 0%{transform:scale(1);opacity:1} 100%{transform:scale(3);opacity:0} }

@media(min-width:580px){ #modal-overlay{align-items:center} #report-sheet{border-radius:24px;margin-bottom:20px;max-height:88vh} }
@media(max-width:360px){ .type-grid{grid-template-columns:repeat(2,1fr)} }
</style>
</head>
<body>

<!-- ═══ MAP ════════════════════════════════════════════════ -->
<div id="map"></div>

<!-- ═══ TOP BAR ════════════════════════════════════════════ -->
<div id="topbar">
  <div id="logo">
    <div id="logo-mark">🚦</div>
    <div>
      <div id="logo-text">Traffic<span>Watch</span></div>
      <div id="logo-sub">Live Road Intel &nbsp;<span id="conn-dot"></span></div>
    </div>
  </div>
  <div id="stats-pill">
    <div class="stat-chip"><div class="dot dot-red"></div><span id="cnt-red">0</span>&nbsp;serious</div>
    <div class="stat-chip"><div class="dot dot-amber"></div><span id="cnt-amber">0</span>&nbsp;moderate</div>
    <div class="stat-chip"><div class="dot dot-green"></div><span id="cnt-total">0</span>&nbsp;live</div>
  </div>
</div>
<div id="offline-banner"><span>📴</span> Offline — reports will sync when reconnected</div>

<!-- ═══ BOTTOM PANEL ════════════════════════════════════ -->
<div id="bottom-panel">
  <div id="layer-controls">
    <button class="layer-btn active" id="btn-markers" onclick="setLayer('markers')">📍 Incidents</button>
    <button class="layer-btn"        id="btn-heatmap" onclick="setLayer('heatmap')">🌡️ Heatmap</button>
    <button class="layer-btn"        id="btn-both"    onclick="setLayer('both')">⊕ Both</button>
  </div>
  <button id="report-btn" onclick="openReportSheet()">
    <span>⚠️</span> Report Incident
    <div id="pending-badge"></div>
  </button>
</div>

<!-- ═══ REPORT SHEET ════════════════════════════════════ -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div id="report-sheet">
    <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
    <div class="sheet-header">
      <div class="sheet-title">⚠️ Report Incident</div>
      <div class="sheet-sub">Help others avoid dangerous roads</div>
    </div>
    <div class="form-body">
      <div class="form-section">
        <label>📍 Location</label>
        <div id="location-row">
          <span id="location-icon" style="font-size:20px">📡</span>
          <div id="location-text">
            <strong id="loc-coords">Fetching GPS…</strong>
            <span id="loc-accuracy"></span>
          </div>
          <button id="refresh-gps" onclick="fetchGPS()" title="Refresh GPS">🔄</button>
        </div>
      </div>
      <div class="form-section">
        <label>🚨 Incident Type</label>
        <div class="type-grid">
          <div class="type-chip" data-type="accident"  onclick="selectType(this)"><span class="tc-icon">💥</span><span class="tc-label">Accident</span></div>
          <div class="type-chip" data-type="breakdown" onclick="selectType(this)"><span class="tc-icon">🔧</span><span class="tc-label">Breakdown</span></div>
          <div class="type-chip" data-type="flooding"  onclick="selectType(this)"><span class="tc-icon">🌊</span><span class="tc-label">Flooding</span></div>
          <div class="type-chip" data-type="roadblock" onclick="selectType(this)"><span class="tc-icon">🚧</span><span class="tc-label">Roadblock</span></div>
          <div class="type-chip" data-type="police"    onclick="selectType(this)"><span class="tc-icon">👮</span><span class="tc-label">Police</span></div>
          <div class="type-chip" data-type="traffic"   onclick="selectType(this)"><span class="tc-icon">🚗</span><span class="tc-label">Heavy Traffic</span></div>
        </div>
      </div>
      <div class="form-section">
        <label>📸 Photo Evidence (optional)</label>
        <div id="photo-zone" onclick="document.getElementById('photo-input').click()">
          <input type="file" id="photo-input" accept="image/*" capture="environment" onchange="handlePhoto(event)">
          <img id="photo-preview" src="" alt="">
          <div id="photo-placeholder">
            <div class="pz-icon">📷</div>
            <div class="pz-text">Tap to take photo or upload</div>
            <div class="pz-hint">JPG / PNG up to 5MB</div>
          </div>
        </div>
      </div>
      <div class="form-section">
        <label>📝 Description (optional)</label>
        <textarea id="desc-input" placeholder="e.g. Overturned truck blocking 2 lanes near Legon traffic light…" maxlength="280"></textarea>
      </div>
      <button id="submit-btn" onclick="submitReport()"><span>🚨</span> Submit Report</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- ═══ SUPABASE SDK ══════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- ═══ APP ══════════════════════════════════════════════ -->
<script>
// ══════════════════════════════════════════════════════════════
//  TrafficWatch GH · Supabase Edition
// ══════════════════════════════════════════════════════════════

const EXPIRY_MS = 60 * 60 * 1000; // 1 hour

const TYPE_META = {
  accident:  { icon:'💥', label:'Accident',        severity:3 },
  roadblock: { icon:'🚧', label:'Roadblock',       severity:3 },
  flooding:  { icon:'🌊', label:'Flooding',         severity:3 },
  breakdown: { icon:'🔧', label:'Breakdown',        severity:2 },
  traffic:   { icon:'🚗', label:'Heavy Traffic',    severity:1 },
  police:    { icon:'👮', label:'Police Activity',  severity:1 },
};

// ── State ─────────────────────────────────────────────────────
let sb = null;            // Supabase client
let map, clusterLayer, heatLayer, userMarker;
let incidents = {};       // id → row
let lMarkers  = {};       // id → L.marker
let gpsCoords = null;
let selectedType = null;
let photoDataURL = null;
let offlineQueue = [];
let isOnline = navigator.onLine;
let isDemoMode = false;
let currentLayerMode = 'markers';

// ══ CREDENTIALS — set your Supabase project details here ═════
const SUPABASE_URL = 'https://gollmeddvrrorvzjypga.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvbGxtZWRkdnJyb3J2emp5cGdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTU5MDQsImV4cCI6MjA5NDE3MTkwNH0.nODywM5fZNVqM3hrldhUPpnUDT-arxrCe8RU33tFehc';

// ══ AUTO-BOOT ═════════════════════════════════════════════════
window.addEventListener('load', function() {
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    initApp();
    loadIncidents();
    subscribeRealtime();
  } catch(e) {
    showToast('❌ Supabase init failed: ' + e.message, 'error');

// ══ MAP INIT ══════════════════════════════════════════════════

function initApp() {
  initMap();
  initOfflineQueue();
  updateConnectionUI();
  window.addEventListener('online',  onOnline);
  window.addEventListener('offline', onOffline);
  setInterval(checkExpiry, 60000);
  fetchGPS();
}

function initMap() {
  map = L.map('map', { center:[5.6037,-0.1870], zoom:13, zoomControl:false, attributionControl:false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom:19, subdomains:'abcd' }).addTo(map);
  L.control.zoom({ position:'topright' }).addTo(map);
  L.control.attribution({ position:'bottomleft', prefix:'© CartoDB · Supabase' }).addTo(map);

  clusterLayer = L.markerClusterGroup({
    maxClusterRadius: 60, showCoverageOnHover: false,
    iconCreateFunction(cluster) {
      const n = cluster.getChildCount();
      const bg = n>=5 ? 'rgba(180,20,10,.9)' : n>=3 ? 'rgba(232,48,26,.85)' : 'rgba(245,158,11,.85)';
      const fg = n < 3 ? '#000' : '#fff';
      return L.divIcon({
        html:`<div style="width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;background:${bg};color:${fg};border:2px solid rgba(255,255,255,.2);box-shadow:0 4px 16px rgba(0,0,0,.5)">${n}</div>`,
        className:'', iconSize:[38,38], iconAnchor:[19,19]
      });
    }
  });
  map.addLayer(clusterLayer);

  heatLayer = L.heatLayer([], {
    radius:35, blur:25, maxZoom:17,
    gradient:{0.2:'#3b82f6', 0.5:'#f59e0b', 0.8:'#ef4444', 1.0:'#7f1d1d'}
  });
}

// ══ SUPABASE LOAD + REALTIME ══════════════════════════════════

async function loadIncidents() {
  const cutoff = new Date(Date.now() - EXPIRY_MS).toISOString();
  const { data, error } = await sb.from('incidents')
    .select('*')
    .eq('status','active')
    .gte('created_at', cutoff)
    .order('created_at', { ascending:false });

  if (error) { showToast('⚠️ Load error: ' + error.message, 'error'); return; }
  (data||[]).forEach(row => { incidents[row.id]=row; upsertMarker(row.id, row); });
  refreshStats(); refreshHeatmap();
}

function subscribeRealtime() {
  sb.channel('incidents-live')
    .on('postgres_changes', { event:'*', schema:'public', table:'incidents' }, handleRealtimeEvent)
    .subscribe(status => {
      if (status === 'SUBSCRIBED') document.getElementById('conn-dot').classList.remove('offline');
    });
}

function handleRealtimeEvent({ eventType, new:n, old:o }) {
  if (eventType === 'INSERT') {
    if (Date.now() - new Date(n.created_at).getTime() > EXPIRY_MS) return;
    if ((n.downvotes||0) - (n.upvotes||0) >= 3) return;
    incidents[n.id] = n;
    upsertMarker(n.id, n);
    showToast(`📍 New ${TYPE_META[n.type]?.label||'incident'} reported`, 'warning');
  }
  if (eventType === 'UPDATE') {
    if (n.status==='resolved' || (n.downvotes||0)-(n.upvotes||0)>=3) removeMarker(n.id);
    else { incidents[n.id]=n; upsertMarker(n.id, n); }
  }
  if (eventType === 'DELETE') removeMarker(o.id);
  refreshStats(); refreshHeatmap();
}

// ══ SMART STATUS ══════════════════════════════════════════════

function smartStatus(inc) {
  const meta   = TYPE_META[inc.type] || TYPE_META.traffic;
  const ageMin = (Date.now() - new Date(inc.created_at).getTime()) / 60000;
  const decay  = ageMin > 20 ? Math.max(0.3, 1-(ageMin-20)/40) : 1;
  let score    = meta.severity * decay;
  if ((inc.report_count||1) >= 3)                      score += 1;
  if ((inc.upvotes||0)-(inc.downvotes||0) > 3)         score += 0.5;
  return score >= 2.5 ? 'red' : 'amber';
}

function expiryPct(inc) {
  return Math.min(1, (Date.now() - new Date(inc.created_at).getTime()) / EXPIRY_MS);
}

// ══ MARKERS ═══════════════════════════════════════════════════

function makeIcon(inc) {
  const st  = smartStatus(inc);
  const meta = TYPE_META[inc.type] || TYPE_META.traffic;
  const pct = expiryPct(inc);
  const col = st==='red' ? '#E8301A' : '#F59E0B';
  const glw = st==='red' ? 'rgba(232,48,26,.5)' : 'rgba(245,158,11,.5)';
  const opa = Math.max(0.4, 1 - pct*0.6);
  return L.divIcon({
    html:`<div style="position:relative;width:42px;height:42px;opacity:${opa};display:flex;align-items:center;justify-content:center">
            <div style="position:absolute;inset:0;border-radius:50%;background:${col};opacity:.15;animation:loc-pulse 2.5s infinite"></div>
            <div style="width:34px;height:34px;background:${col};border-radius:50%;border:2px solid rgba(255,255,255,.3);box-shadow:0 0 18px ${glw},0 4px 12px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:16px">${meta.icon}</div>
          </div>`,
    className:'', iconSize:[42,42], iconAnchor:[21,21]
  });
}

function upsertMarker(id, inc) {
  if (!map) return;
  if (lMarkers[id]) clusterLayer.removeLayer(lMarkers[id]);
  const m = L.marker([inc.lat, inc.lng], { icon: makeIcon(inc) });
  m.bindPopup(() => buildPopup(id, inc), { maxWidth:300 });
  clusterLayer.addLayer(m);
  lMarkers[id] = m;
}

function removeMarker(id) {
  if (lMarkers[id]) { clusterLayer.removeLayer(lMarkers[id]); delete lMarkers[id]; }
  delete incidents[id];
}

function buildPopup(id, inc) {
  const meta  = TYPE_META[inc.type] || TYPE_META.traffic;
  const st    = smartStatus(inc);
  const ageM  = Math.round((Date.now()-new Date(inc.created_at).getTime())/60000);
  const ageS  = ageM<60 ? `${ageM}m ago` : `${Math.round(ageM/60)}h ago`;
  const pct   = expiryPct(inc);
  const fw    = Math.round((1-pct)*100);
  const fc    = pct<0.4?'fresh':pct<0.7?'aging':'old';
  const n     = inc.report_count||1;
  const photo = inc.photo ? `<img class="popup-img" src="${inc.photo}" loading="lazy">` : '';
  return `<div class="incident-popup">
    <div class="popup-type-badge ${st}">${meta.icon} ${meta.label}</div>
    ${photo}
    <div class="popup-desc">${inc.description||'No description provided.'}</div>
    <div class="popup-meta">
      <span>⏱ ${ageS} · ${n} report${n!==1?'s':''}</span>
      <span>👍 ${inc.upvotes||0} · 👎 ${inc.downvotes||0}</span>
    </div>
    <div class="expiry-bar"><div class="expiry-fill ${fc}" style="width:${fw}%"></div></div>
    <div class="popup-votes" style="margin-top:10px">
      <button class="vote-btn up"   onclick="castVote('${id}','up')">👍 Confirm</button>
      <button class="vote-btn down" onclick="castVote('${id}','down')">👎 False</button>
    </div>
    <div class="popup-actions">
      <button class="popup-action-btn confirm" onclick="confirmReport('${id}')">✅ Still here</button>
      <button class="popup-action-btn resolve" onclick="resolveReport('${id}')">✓ Resolved</button>
    </div>
  </div>`;
}

// ══ GPS ═══════════════════════════════════════════════════════

window.fetchGPS = function() {
  const btn = document.getElementById('refresh-gps');
  btn.classList.add('spinning');
  document.getElementById('loc-coords').textContent = 'Fetching GPS…';
  document.getElementById('loc-accuracy').textContent = '';
  document.getElementById('location-icon').textContent = '📡';

  if (!navigator.geolocation) {
    showToast('❌ Geolocation not supported', 'error');
    btn.classList.remove('spinning'); return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      gpsCoords = { lat:pos.coords.latitude, lng:pos.coords.longitude };
      document.getElementById('loc-coords').textContent = `${gpsCoords.lat.toFixed(5)}, ${gpsCoords.lng.toFixed(5)}`;
      document.getElementById('loc-accuracy').textContent = `±${Math.round(pos.coords.accuracy)}m accuracy`;
      document.getElementById('location-icon').textContent = '✅';
      btn.classList.remove('spinning');
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker([gpsCoords.lat,gpsCoords.lng],{
        icon:L.divIcon({html:'<div class="loc-dot"></div>',className:'',iconSize:[14,14],iconAnchor:[7,7]}),
        zIndexOffset:1000
      }).addTo(map);
      map.setView([gpsCoords.lat,gpsCoords.lng],15,{animate:true});
    },
    () => {
      document.getElementById('loc-coords').textContent = 'Location unavailable';
      document.getElementById('loc-accuracy').textContent = 'Tap map to set manually';
      document.getElementById('location-icon').textContent = '❌';
      btn.classList.remove('spinning');
      showToast('📍 Tap the map to set location manually','warning');
      map.once('click', e => {
        gpsCoords = { lat:e.latlng.lat, lng:e.latlng.lng };
        document.getElementById('loc-coords').textContent = `${gpsCoords.lat.toFixed(5)}, ${gpsCoords.lng.toFixed(5)}`;
        document.getElementById('loc-accuracy').textContent = 'Set manually';
        document.getElementById('location-icon').textContent = '📍';
      });
    },
    { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
  );
};

// ══ PHOTO ═════════════════════════════════════════════════════

window.handlePhoto = function(e) {
  const file = e.target.files[0]; if (!file) return;
  if (file.size > 5*1024*1024) { showToast('❌ Photo must be under 5MB','error'); return; }
  const img = new Image();
  img.onload = () => {
    const MAX=800, canvas=document.createElement('canvas');
    let w=img.width, h=img.height;
    if (w>MAX||h>MAX) { if(w>h){h=h*MAX/w;w=MAX}else{w=w*MAX/h;h=MAX} }
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    photoDataURL = canvas.toDataURL('image/jpeg',0.72);
    const pv = document.getElementById('photo-preview');
    pv.src = photoDataURL; pv.classList.add('show');
    document.getElementById('photo-placeholder').style.display='none';
    document.getElementById('photo-zone').classList.add('has-photo');
  };
  img.src = URL.createObjectURL(file);
};

// ══ TYPE SELECT ═══════════════════════════════════════════════

window.selectType = function(el) {
  document.querySelectorAll('.type-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  selectedType = el.dataset.type;
};

// ══ SHEET ═════════════════════════════════════════════════════

window.openReportSheet = function() {
  document.getElementById('modal-overlay').classList.add('open');
  if (!gpsCoords) fetchGPS();
};
function closeSheet() { document.getElementById('modal-overlay').classList.remove('open'); }
window.handleOverlayClick = function(e) { if(e.target===document.getElementById('modal-overlay')) closeSheet(); };

// ══ SUBMIT ════════════════════════════════════════════════════

window.submitReport = async function() {
  if (!selectedType) { showToast('⚠️ Select an incident type','warning'); return; }
  if (!gpsCoords)    { showToast('📍 Enable location first','warning'); fetchGPS(); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span style="display:inline-block;animation:spin 1s linear infinite">⏳</span> Submitting…';

  const payload = {
    lat: gpsCoords.lat, lng: gpsCoords.lng,
    type: selectedType,
    description: document.getElementById('desc-input').value.trim(),
    photo: photoDataURL || '',
    upvotes:0, downvotes:0, report_count:1, status:'active',
  };

  // bump nearby same-type count
  Object.entries(incidents).forEach(([id,inc])=>{
    if (Math.hypot(inc.lat-payload.lat, inc.lng-payload.lng) < 0.002 && inc.type===payload.type) {
      payload.report_count = (inc.report_count||1)+1;
      if (!isDemoMode && sb) sb.from('incidents').update({report_count:payload.report_count}).eq('id',id);
    }
  });

  try {
    if (isDemoMode) {
      const id='user_'+Date.now();
      const row={id,...payload,created_at:new Date().toISOString()};
      incidents[id]=row; upsertMarker(id,row);
      refreshStats(); refreshHeatmap();
      showToast('✅ Report added (demo)','success');
    } else if (!isOnline) {
      offlineQueue.push(payload); saveOfflineQueue(); updatePendingBadge();
      showToast('📴 Saved offline — will sync when online','warning');
    } else {
      const { error } = await sb.from('incidents').insert(payload);
      if (error) throw error;
      showToast('✅ Report submitted!','success');
    }
    resetForm(); closeSheet();
    if (map) map.setView([payload.lat,payload.lng],15,{animate:true});
  } catch(err) {
    showToast('❌ '+(err.message||'Submission failed'),'error');
  } finally {
    btn.disabled=false;
    btn.innerHTML='<span>🚨</span> Submit Report';
  }
};

function resetForm() {
  selectedType=null; photoDataURL=null;
  document.querySelectorAll('.type-chip').forEach(c=>c.classList.remove('selected'));
  document.getElementById('desc-input').value='';
  document.getElementById('photo-preview').classList.remove('show');
  document.getElementById('photo-preview').src='';
  document.getElementById('photo-placeholder').style.display='';
  document.getElementById('photo-zone').classList.remove('has-photo');
  document.getElementById('photo-input').value='';
}

// ══ VOTES & ACTIONS ═══════════════════════════════════════════

window.castVote = async function(id, type) {
  const inc=incidents[id]; if(!inc) return;
  const field=type==='up'?'upvotes':'downvotes';
  const val=(inc[field]||0)+1;
  if (isDemoMode) { inc[field]=val; upsertMarker(id,inc); }
  else {
    const {error}=await sb.from('incidents').update({[field]:val}).eq('id',id);
    if(error){showToast('❌ '+error.message,'error');return;}
  }
  map.closePopup();
  showToast(type==='up'?'👍 Confirmed!':'👎 Marked as false','success');
};

window.confirmReport = async function(id) {
  const now=new Date().toISOString();
  if (isDemoMode) { if(incidents[id]){incidents[id].created_at=now;upsertMarker(id,incidents[id]);} }
  else { await sb.from('incidents').update({created_at:now,upvotes:(incidents[id]?.upvotes||0)+1}).eq('id',id); }
  map.closePopup();
  showToast('✅ Incident confirmed as still active','success');
};

window.resolveReport = async function(id) {
  if (isDemoMode) { removeMarker(id); refreshStats(); refreshHeatmap(); }
  else { await sb.from('incidents').update({status:'resolved'}).eq('id',id); }
  map.closePopup();
  showToast('✓ Marked as resolved — thank you!','success');
};

// ══ EXPIRY ════════════════════════════════════════════════════

function checkExpiry() {
  const now=Date.now();
  Object.entries(incidents).forEach(([id,inc])=>{
    if (now-new Date(inc.created_at).getTime()>EXPIRY_MS) removeMarker(id);
    else upsertMarker(id,inc);
  });
  refreshStats(); refreshHeatmap();
}

// ══ LAYERS ════════════════════════════════════════════════════

window.setLayer = function(mode) {
  currentLayerMode=mode;
  document.querySelectorAll('.layer-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+mode)?.classList.add('active');
  if (mode==='markers')     {map.addLayer(clusterLayer);map.removeLayer(heatLayer);}
  else if(mode==='heatmap') {map.removeLayer(clusterLayer);map.addLayer(heatLayer);}
  else                      {map.addLayer(clusterLayer);map.addLayer(heatLayer);}
};

function refreshHeatmap() {
  heatLayer.setLatLngs(Object.values(incidents).map(i=>[i.lat,i.lng,smartStatus(i)==='red'?1:0.5]));
}

// ══ STATS ═════════════════════════════════════════════════════

function refreshStats() {
  const all=Object.values(incidents);
  document.getElementById('cnt-red').textContent   = all.filter(i=>smartStatus(i)==='red').length;
  document.getElementById('cnt-amber').textContent = all.filter(i=>smartStatus(i)==='amber').length;
  document.getElementById('cnt-total').textContent = all.length;
}

// ══ OFFLINE ═══════════════════════════════════════════════════

function initOfflineQueue() {
  try { offlineQueue=JSON.parse(localStorage.getItem('tw_q')||'[]'); } catch{offlineQueue=[];}
  updatePendingBadge();
}
function saveOfflineQueue() { localStorage.setItem('tw_q',JSON.stringify(offlineQueue)); }
function updatePendingBadge() {
  const el=document.getElementById('pending-badge');
  if(offlineQueue.length>0){el.textContent=offlineQueue.length;el.classList.add('show');}
  else el.classList.remove('show');
}
async function flushOfflineQueue() {
  if(!sb||offlineQueue.length===0) return;
  const q=[...offlineQueue]; offlineQueue=[]; saveOfflineQueue(); updatePendingBadge();
  for(const p of q) {
    try { const{error}=await sb.from('incidents').insert(p); if(error)offlineQueue.push(p); }
    catch{offlineQueue.push(p);}
  }
  saveOfflineQueue(); updatePendingBadge();
  const synced=q.length-offlineQueue.length;
  if(synced>0) showToast(`☁️ ${synced} offline report${synced!==1?'s':''} synced!`,'success');
}
function onOnline()  { isOnline=true;  updateConnectionUI(); flushOfflineQueue(); }
function onOffline() { isOnline=false; updateConnectionUI(); }
function updateConnectionUI() {
  const dot=document.getElementById('conn-dot'), ban=document.getElementById('offline-banner');
  if(isOnline){dot.classList.remove('offline');ban.classList.remove('show');}
  else        {dot.classList.add('offline');   ban.classList.add('show');}
}

// ══ TOAST ═════════════════════════════════════════════════════

let _tt;
window.showToast = function(msg, type='success') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show '+type;
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),3500);
};

// Boot
updateConnectionUI();
</script>
